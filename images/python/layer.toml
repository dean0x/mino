[layer]
name = "python"
description = "Python 3 + uv + ruff + pytest"
version = "2"

[root_install]
packages = ["python3", "python3-devel"]

[user_install]
runtime = "uv"
uv_tools = ["ruff", "pytest"]

[env]
UV_CACHE_DIR = "/cache/uv"
UV_PYTHON_INSTALL_DIR = "/cache/uv/python"
PYTHONDONTWRITEBYTECODE = "1"
PYTHONUNBUFFERED = "1"

[env.path_prepend]
dirs = ["/home/developer/.local/bin"]

[cache]
paths = ["/cache/uv"]
