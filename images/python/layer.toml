[layer]
name = "python"
description = "Python 3 + uv + ruff + pytest"
version = "1"

[env]
UV_CACHE_DIR = "/cache/uv"
UV_PYTHON_INSTALL_DIR = "/cache/uv/python"
UV_TOOL_DIR = "/opt/uv-tools"
UV_TOOL_BIN_DIR = "/opt/uv-tools/bin"
PYTHONDONTWRITEBYTECODE = "1"
PYTHONUNBUFFERED = "1"

[env.path_prepend]
dirs = ["/opt/uv-tools/bin"]

[cache]
paths = ["/cache/uv"]
